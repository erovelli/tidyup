# Golden evaluation corpus for tidyup's classification cascade.
#
# Each entry pins a fixture file to the taxonomy folder it *should* land in.
#
#   file     — path relative to `xtask/corpus/`.
#   expected — taxonomy leaf the cascade should route the file to (trailing '/').
#              Temporal categories may append a year subdirectory at runtime
#              (e.g. "Finance/Taxes/2023/"); the harness treats that as correct.
#   tier1    — true  => Tier-1 heuristics alone should resolve it (extension or
#                       marker filename). These are deterministic and run in CI
#                       with no model.
#              false => content-dependent; only the Tier-2 embedding classifier
#                       can route it, so it is scored only when the
#                       bge-small-en-v1.5 bundle is installed.
#
# Keep `expected` for tier1 entries in sync with `tidyup_pipeline::heuristics`
# — the `tier1_entries_match_heuristics` test enforces it.

# ── Tier 1: heuristic-resolvable (extension / marker filename) ──────────────

[[entry]]
file = "files/main.rs"
expected = "Code/"
tier1 = true

[[entry]]
file = "files/server.py"
expected = "Code/"
tier1 = true

