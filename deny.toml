# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false

[advisories]
version = 2
yanked  = "deny"
ignore  = [
    # paste 1.0.15 is unmaintained (archived by dtolnay). Pulled in transitively
    # by lofty 0.24 and rav1e 0.8 (via ravif -> image). No safe upgrade available.
    # Revisit when upstream migrates to pastey or equivalent.
    { id = "RUSTSEC-2024-0436", reason = "transitive via lofty + rav1e; no upstream fix available" },

    # fxhash 0.2.1 is unmaintained. Pulled in transitively by bm25 -> mistralrs-core.
    # Only reachable under --features llm-fallback. Default build is unaffected.
    { id = "RUSTSEC-2025-0057", reason = "transitive via mistralrs; only under --features llm-fallback; no upstream fix" },

    # number_prefix 0.4.0 is unmaintained (indicatif dep). Pulled in transitively by
    # hf-hub -> mistralrs. Only reachable under --features llm-fallback.
    { id = "RUSTSEC-2025-0119", reason = "transitive via hf-hub -> indicatif; only under --features llm-fallback; no upstream fix" },

    # gtk-rs GTK3 bindings archived 2024. Pulled in transitively via
    # dioxus-desktop -> wry/tao/muda/tray-icon only in the `tidyup-ui` binary.
    # Upstream recommends migrating to gtk4-rs, but wry/tao haven't cut over
    # yet, so no "safe upgrade" is available for dioxus-desktop 0.7. These are
    # unmaintained advisories, not active CVEs — the code still ships and
    # builds. Revisit when dioxus-desktop moves off GTK3.
    # CI privacy check on `tidyup-cli` stays clean; this dep tree is
    # UI-binary-only.
    { id = "RUSTSEC-2024-0412", reason = "gdk: archived gtk-rs GTK3 stack; transitive via dioxus-desktop" },
    { id = "RUSTSEC-2024-0416", reason = "atk-sys: archived gtk-rs GTK3 stack; transitive via dioxus-desktop" },
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.93

# Scoped exceptions — narrower than adding to the global allow list.
[[licenses.exceptions]]
# NCSA is OSI-approved + FSF Free. libfuzzer-sys is a build-only dep of rav1e.
name  = "libfuzzer-sys"
allow = ["NCSA"]

[[licenses.exceptions]]
# CDLA-Permissive-2.0 is the Linux Foundation's standard data license, used
# here for the Mozilla CA certificate bundle. Only present under --features remote.
name  = "webpki-root-certs"
allow = ["CDLA-Permissive-2.0"]

[[licenses.exceptions]]
# Same CDLA-Permissive-2.0 bundle as webpki-root-certs; this is the legacy
# crate name still pulled in via ureq/hf-hub under --features llm-fallback.
name  = "webpki-roots"
allow = ["CDLA-Permissive-2.0"]

[[licenses.exceptions]]
# 0BSD is OSI-approved and permissive (effectively public-domain equivalent).
# Scoped per-crate rather than added globally. All three are transitive
# through mistralrs under --features llm-fallback.
name  = "doctest-file"
allow = ["0BSD"]

[[licenses.exceptions]]
name  = "interprocess"
allow = ["0BSD"]

[[licenses.exceptions]]
name  = "recvmsg"
allow = ["0BSD"]

[bans]
multiple-versions = "warn"
wildcards         = "deny"
deny = [
    # { name = "openssl", reason = "use rustls" },
]

[sources]
unknown-registry = "deny"
unknown-git      = "warn"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
